<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="stylesheet" media="all" type="text/css" href="slide.css">
    <script src="slide.js"></script>
    
</head>
<body>
    

        <!-- Slide Section ======================================================================== -->
        <section class="slideContainer">

            <article class="slide primeiro">
                <!-- <img src="" alt=""> -->
            </article>
            <article class="slide segundo">
                <!-- <img src="" alt=""> -->
            </article>
            <article class="slide terceiro">
                <!-- <img src="" alt=""> -->
            </article>

            <div class="containerButtonsSlide">
                <article class="arrowContainer">
                    <button><i class="bi bi-caret-left-fill"></i></button>
                    <button><i class="bi bi-caret-right-fill"></i></button>
                </article>

                <article class="containerDots">
                    <button onclick="alterSlide(0, 'dots')" class="dot"></button>
                    <button onclick="alterSlide(1, 'dots')" class="dot"></button>
                    <button onclick="alterSlide(2, 'dots')" class="dot"></button>
                </article>
            </div>

            <style>
                .primeiro {
                    background-color: red;
                }

                .segundo {
                    background-color: green;
                }

                .terceiro {
                    background-color: blue;
                }
            </style>
        </section>
        <!-- Slide Section ======================================================================== -->

</body>
</html>
